name: Bagisto API – Playwright Tests

on:
  push:
  pull_request:

jobs:
  bagisto-api-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bagisto
        ports:
          - 3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      BAGISTO_URL: ${{ secrets.BAGISTO_URL }}

    steps:
      # -------------------------------
      # Checkout tests repo
      # -------------------------------
      - name: Checkout tests
        uses: actions/checkout@v4

      # -------------------------------
      # Checkout Bagisto API module
      # -------------------------------
      - name: Checkout Bagisto API
        uses: actions/checkout@v4
        with:
          repository: pawan-webkul/bagisto-api
          path: bagisto-api

      # -------------------------------
      # Setup PHP
      # -------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          tools: composer:v2

      # -------------------------------
      # Install Bagisto
      # -------------------------------
      - name: Install Bagisto
        run: |
          composer create-project bagisto/bagisto:2.4.7 bagisto
          cd bagisto

          cp .env.example .env

          # Only DB config (no BASE URL usage)
          sed -i "s|DB_HOST=.*|DB_HOST=127.0.0.1|" .env
          sed -i "s|DB_PORT=.*|DB_PORT=${{ job.services.mysql.ports['3306'] }}|" .env
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=bagisto|" .env
          sed -i "s|DB_USERNAME=.*|DB_USERNAME=root|" .env
          sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=root|" .env

          php artisan bagisto:install --skip-env-check --skip-admin-creation --skip-github-star
          php artisan db:seed --class="Webkul\Installer\Database\Seeders\ProductTableSeeder"

          php artisan indexer:index --mode=full

      # -------------------------------
      # Copy Bagisto API into packages
      # -------------------------------
      - name: Copy Bagisto API package
        run: |
          mkdir -p bagisto/packages/Webkul
          mv bagisto-api bagisto/packages/Webkul/BagistoApi

      # -------------------------------
      # Register Service Provider
      # -------------------------------
      - name: Register Service Provider
        working-directory: bagisto
        run: |
          sed -i "/return \[/a \    Webkul\\\\BagistoApi\\\\Providers\\\\BagistoApiServiceProvider::class," bootstrap/providers.php

      # -------------------------------
      # Register PSR-4 Autoload
      # -------------------------------
      - name: Register Autoload
        working-directory: bagisto
        run: |
          sed -i '/"psr-4": {/a \    "Webkul\\\\BagistoApi\\\\": "packages/Webkul/BagistoApi/src",' composer.json

      # -------------------------------
      # Install API dependencies
      # -------------------------------
      - name: Install API dependencies
        working-directory: bagisto
        run: |
          composer require \
            api-platform/laravel:v4.1.25 \
            api-platform/graphql:v4.2.3 \
            api-platform/metadata:v4.3.1 \
            api-platform/serializer:v4.3.1 \
            api-platform/state:v4.3.1 \
            api-platform/jsonld:v4.3.1 \
            api-platform/hydra:v4.3.1 \
            api-platform/openapi:v4.3.1 \
            api-platform/json-schema:v4.3.1 \
            api-platform/json-api:v4.3.1 \
            api-platform/documentation:v4.3.1

      # -------------------------------
      # Run API installation
      # -------------------------------
      - name: Install Bagisto API
        working-directory: bagisto
        run: |
          composer dump-autoload
          php artisan optimize:clear
          php artisan bagisto-api-platform:install

      # -------------------------------
      # Fetch Storefront API Key
      # -------------------------------
      - name: Fetch Storefront API Key
        run: |
          KEY=$(grep STOREFRONT_PLAYGROUND_KEY bagisto/.env | cut -d '=' -f2)
          echo "STOREFRONT_ACCESS_KEY=$KEY" >> $GITHUB_ENV

      # -------------------------------
      # Issue a fresh admin integration token for the ephemeral CI database.
      # Generated inline here (CI-only) rather than via a shippable artisan
      # command, so no admin-token minting backdoor ever ships in the package.
      # -------------------------------
      - name: Issue admin integration token
        working-directory: bagisto
        run: |
          RESULT=$(php artisan tinker --execute '
            $role = \Webkul\User\Models\Role::where("permission_type","all")->value("id");
            $admin = \Webkul\User\Models\Admin::first() ?? \Webkul\User\Models\Admin::create(["name"=>"E2E Admin","email"=>"api-e2e@example.com","password"=>bcrypt(\Illuminate\Support\Str::random(16)),"role_id"=>$role,"status"=>1]);
            $p = \Illuminate\Support\Str::random(40);
            $t = \Webkul\BagistoApi\Admin\Models\AdminPersonalAccessToken::create(["admin_id"=>$admin->id,"name"=>"e2e","token"=>hash("sha256",$p),"token_preview"=>substr($p,0,8),"permission_type"=>"all","abilities"=>[],"expires_at"=>now()->addDay(),"status"=>"active","created_by_admin_id"=>$admin->id]);
            echo "E2E_CREDS=".$admin->email."::".$t->id."|".$p;
          ')
          LINE=$(echo "$RESULT" | grep "E2E_CREDS=" | head -1 | sed "s/E2E_CREDS=//")
          echo "ADMIN_EMAIL=${LINE%%::*}" >> $GITHUB_ENV
          echo "ADMIN_INTEGRATION_TOKEN=${LINE##*::}" >> $GITHUB_ENV
          echo "BAGISTO_URL=http://127.0.0.1:8000" >> $GITHUB_ENV

      # -------------------------------
      # Start server
      # -------------------------------
      - name: Start Bagisto server
        run: |
          cd bagisto
          php artisan serve --host=0.0.0.0 --port=8000 &

      # -------------------------------
      # Wait for server
      # -------------------------------
      - name: Wait for Bagisto
        run: npx wait-on http://127.0.0.1:8000

      # -------------------------------
      # Setup Node.js
      # -------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Verify path
        run: |
             echo "Checking path..."
             ls -la bagisto/packages/Webkul/BagistoApi
             ls -la bagisto/packages/Webkul/BagistoApi/tests || echo "No tests folder"
             ls -la bagisto/packages/Webkul/BagistoApi/tests/e2e-pw || echo "No e2e-pw folder"

      # -------------------------------
      # Install Playwright & Run Test
      # -------------------------------
      - name: Install Playwright
        env:
          BAGISTO_URL: ${{ env.BAGISTO_URL }}
          STOREFRONT_ACCESS_KEY: ${{ env.STOREFRONT_ACCESS_KEY }}
          ADMIN_INTEGRATION_TOKEN: ${{ env.ADMIN_INTEGRATION_TOKEN }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
        run: |
             cd bagisto/packages/Webkul/BagistoApi/tests/e2e-pw
             npm install
             npx playwright install --with-deps chromium
             npx playwright test tests --shard=${{ matrix.shard }} --reporter=list,html

      # -------------------------------
      # Upload report
      # -------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

